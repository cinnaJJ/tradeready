<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}TradeReady{% endblock %} — Crypto Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  {% block head %}{% endblock %}
</head>
<body data-loading="{{ 'true' if loading is defined and loading else 'false' }}">

{% include 'partials/navbar.html' %}

<main class="main-content">
  {% block content %}{% endblock %}
</main>

<footer class="site-footer mt-5">
  <div class="container">
    <div class="row align-items-center py-4">
      <div class="col-md-6">
        <span class="footer-logo">📊 TRADEREADY</span>
        <p class="footer-sub mt-1 mb-0">Paper trade first. Always.</p>
      </div>
      <div class="col-md-6 text-md-end mt-3 mt-md-0">
        <span class="footer-attr">
          Data: <a href="https://www.coingecko.com" target="_blank" rel="noopener">CoinGecko</a>
          &nbsp;·&nbsp;
          <a href="https://coinmarketcap.com/charts/fear-and-greed-index/" target="_blank" rel="noopener">CoinMarketCap</a>
        </span>
        <div class="footer-disc mt-1">For educational purposes only. Not financial advice.</div>
      </div>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
